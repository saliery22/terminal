<body>
<style>

*{   font-family: "Arial"; font-size: 24px;  touch-action: manipulation; /* масштабирование при двойном тапе не происходит */ }
#map { width: 100%; height:65vh;   font-family: "Arial"; font-size: 24px; margin: auto; border-bottom: 2px solid #b1b1b1;}


body {
  overscroll-behavior-y: none; /* После этого свайп вниз не будет вызывать обновление страницы */
}






select { 
    background:  #F0F0F0;
    font-size: 24px;
}


.leaflet-control-layers-toggle {
    width: 150px !important;  /* Жесткая ширина */
    height: 150px !important; /* Жесткая высота */
    background-size: 100px 100px !important; /* Увеличиваем саму иконку внутри */
    background-position: center !important;   /* Центрируем иконку */
}

/* Если нужно, чтобы само меню (когда навел мышкой) тоже было крупным */
.leaflet-control-layers-expanded {
    font-size: 24px !important; /* Увеличиваем текст в списке слоев */
    padding: 20px !important;
}

/* Увеличиваем чекбоксы внутри меню */
.leaflet-control-layers-selector {
    transform: scale(2); /* Делаем галочки в 2 раза больше */
    margin-right: 15px !important;
}

/* Увеличиваем весь контейнер кнопок */
.leaflet-control-zoom.leaflet-bar {
    border: 2px solid #ccc !important;
}

/* Стили для самих кнопок + и - */
.leaflet-control-zoom-in, 
.leaflet-control-zoom-out {
    width: 60px !important;    /* Стандартно ~30px, увеличили до 60 */
    height: 60px !important;   /* Стандартно ~30px, увеличили до 60 */
    line-height: 60px !important; /* Центрируем символ по вертикали */
    font-size: 32px !important;   /* Увеличиваем размер самого плюса и минуса */
}

.leaflet-popup-content-wrapper, .leaflet-popup-tip {
    background: rgba(255, 255, 255, 0.7) !important; /* 0.7 — уровень прозрачности */
    box-shadow: 0 3px 14px rgba(0,0,0,0.2);
}



</style>


<!-- load map -->
 <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
